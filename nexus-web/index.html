<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>NEXUS - Enterprise Vault</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Premium Dynamic Background -->
    <div class="ambient-background">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div class="noise-overlay"></div>
    </div>
    
    <div id="app">
      <!-- Authentication Overlay -->
      <div id="auth-overlay" class="premium-glass">
        <div class="auth-container">
          <div class="brand-showcase">
            <div class="logo-wrapper">
              <div class="logo-icon"></div>
            </div>
            <h1 class="logo-text">NEXUS</h1>
            <p class="subtitle">ZERO-KNOWLEDGE INFRASTRUCTURE</p>
          </div>
          
          <div class="auth-form">
            <div class="input-wrapper">
              <label class="input-label">MASTER DECRYPTION KEY</label>
              <div class="input-glow-container">
                <input type="password" id="master-password" placeholder="••••••••••••••••" autocomplete="off" />
                <div class="focus-ring"></div>
              </div>
            </div>
            <button id="unlock-btn" class="btn-premium">
              <span>Initialize Decryption</span>
              <div class="btn-shine"></div>
            </button>
            <div class="auth-status-container">
              <div class="status-indicator-dot"></div>
              <div class="auth-status" id="auth-status">System Locked</div>
            </div>
          </div>
          
          <div class="security-features">
            <div class="feature-tag"><span class="shield-icon"></span> AES-256-GCM</div>
            <div class="feature-tag"><span class="shield-icon"></span> Argon2id KDF</div>
            <div class="feature-tag"><span class="shield-icon"></span> RAM Wiping</div>
          </div>
        </div>
      </div>

      <!-- Main Vault UI (Hidden initially) -->
      <main id="vault-main" class="hidden">
        <header class="vault-header premium-glass">
          <div class="header-left">
            <div class="logo-mini"></div>
            <div class="header-brand">NEXUS <span class="version-tag">ENTERPRISE 2.0</span></div>
          </div>
          
          <div class="header-right">
            <div class="connection-status">
              <div class="pulse-ring"></div>
              <span class="status-text">ZK-SYNC ACTIVE</span>
            </div>
            <button id="lock-btn" class="btn-outline-danger">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              Lock Session
            </button>
          </div>
        </header>

        <div class="vault-layout">
          <!-- Sidebar -->
          <aside class="sidebar premium-glass">
            <div class="nav-section">
              <h3 class="nav-heading">CATEGORIES</h3>
              <nav class="nav-menu">
                <button class="nav-item active">
                  <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                  All Credentials
                </button>
                <button class="nav-item">
                  <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
                  Favorites
                </button>
                <button class="nav-item">
                  <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                  Identities
                </button>
                <button class="nav-item">
                  <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                  Secure Notes
                </button>
              </nav>
            </div>
            
            <div class="sidebar-footer">
              <div class="telemetry-card">
                <div class="telemetry-header">
                  <span class="telemetry-title">VAULT HEALTH</span>
                  <span class="telemetry-value text-accent">OPTIMAL</span>
                </div>
                <div class="progress-bar-bg">
                  <div class="progress-bar-fill"></div>
                </div>
                <div class="telemetry-stats">
                  <span>ENTRIES: <strong id="entry-count" class="text-white">0</strong></span>
                  <span class="sync-time">Just now</span>
                </div>
              </div>
            </div>
          </aside>

          <!-- Main Content Area -->
          <section class="main-content">
            <div class="toolbar premium-glass">
              <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" class="search-input" placeholder="Search encrypted index..." />
              </div>
              <button id="add-btn" class="btn-premium sm">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                New Entry
              </button>
            </div>
            
            <div class="credentials-grid" id="passwords-list">
              <!-- Dynamically populated credential cards -->
            </div>
          </section>
        </div>
      </main>

      <!-- Add Record Modal -->
      <div id="add-modal" class="modal-backdrop hidden">
        <div class="modal-dialog premium-glass">
          <div class="modal-header">
            <h2 class="modal-title">New Encrypted Record</h2>
            <button class="close-btn" id="cancel-btn">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
          </div>
          
          <div class="modal-body">
            <div class="form-row">
              <div class="form-group">
                <label>TITLE</label>
                <input type="text" id="record-title" class="form-input" placeholder="e.g., AWS Production" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>USERNAME / EMAIL</label>
                <input type="text" id="record-username" class="form-input" placeholder="admin@company.com" />
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>PASSWORD</label>
                <div class="password-field-group">
                  <input type="password" id="record-password" class="form-input" placeholder="••••••••••••••••" />
                  <button type="button" id="generate-pwd-btn" class="btn-outline" title="Generate Secure Password">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
          
          <div class="modal-footer">
            <button id="save-btn" class="btn-premium w-full">Encrypt & Save</button>
          </div>
        </div>
      </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
